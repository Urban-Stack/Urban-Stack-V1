<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite + TS</title>
  </head>

  <body>
    <div id="app"></div>
    <script type="module">
      import { twPalette } from './lib/tailwind/index.ts';

      const baseCol = '#293785';
      const colorPalette = twPalette(baseCol);

      for (const [key, value] of Object.entries(colorPalette).map(([k, v]) => [
        k,
        v.hex,
      ])) {
        document.getElementById('app').innerHTML +=
          `<div style="background-color: ${value}; padding: 1rem;">
          <b>${key}</b>: <span ${baseCol === value && `style='color: red'`}>${value}</span>
         </div>`;
      }
    </script>
  </body>
</html>
