{{- if .Values.objectStorage.enabled -}}
{{- $name := "zipupload" -}}
{{- $serviceName := printf "%s-%s" (include "common.names.fullname" .) $name -}}
---
{{- $host := include "data-hub.zipupload.hostname" . -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ printf "%s-%s" (include "common.names.fullname" .) $name | quote }}
  labels: {{- include "common.labels.standard" . | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
  annotations:
    {{- include "udh.ingress.annotations" (dict "annotations" .Values.zipupload.ingress.annotations "context" .) | nindent 4 }}
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://{{ include "data-hub.govhub.hostname" . }}"
spec:
  rules:
    - host: {{ $host | quote }}
      http:
        paths:
          - backend: {{- include "common.ingress.backend" (dict "serviceName" $serviceName "servicePort" "http" "context" .) | nindent 14 }}
            pathType: Prefix
            path: /api/v1/zipupload
  tls:
  - hosts:
    - {{ $host }}
    secretName: {{ $host }}-tls
{{- end -}}
