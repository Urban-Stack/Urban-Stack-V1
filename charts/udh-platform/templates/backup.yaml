{{- if .Values.backup -}}
{{- $secretName := printf "%s-backup" (include "common.names.fullname" .) -}}
apiVersion: k8up.io/v1
kind: Schedule
metadata:
  name: {{ include "common.names.fullname" . }}
  labels: {{- include "common.labels.standard" . | nindent 4 }}
spec:
  backend:
    s3:
      endpoint: {{ .Values.backup.endpoint }}
      bucket: {{ .Values.backup.bucket | default (printf "%s-%s" .Release.Namespace .Release.Name) }}
      accessKeyIDSecretRef:
        name: {{ $secretName }}
        key: accessKey
      secretAccessKeySecretRef:
        name: {{ $secretName }}
        key: secretAccessKey
    repoPasswordSecretRef:
      name: {{ $secretName }}
      key: restic-key
  backup:
    schedule: {{ .Values.backup.schedule | quote }}
    failedJobsHistoryLimit: 2
    successfulJobsHistoryLimit: 2
  check:
    schedule: "@daily"
  prune:
    schedule: "@daily"
    retention:
      keepDaily: {{ .Values.backup.retention.keepDaily }}
      keepWeekly: {{ .Values.backup.retention.keepWeekly }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels: {{- include "common.labels.standard" . | nindent 4 }}
stringData:
  accessKey: {{ .Values.backup.credentials.accessKey | quote }}
  secretAccessKey: {{ .Values.backup.credentials.secretAccessKey | quote }}
  restic-key: {{ .Values.backup.resticKey | quote }}
{{- end -}}
