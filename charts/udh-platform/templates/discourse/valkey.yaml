{{- if .Values.discourse.enabled }}
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: {{ include "data-hub.name" (dict "context" . "name" "d-vk") }}
spec:
  releaseName: {{ include "data-hub.name" (dict "context" . "name" "d-vk") }}
  chart:
    spec:
      chart: valkey
      version: 6.1.11 # renovate: datasource=docker depName=bitnamicharts/valkey
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: {{ include "data-hub.name" (dict "context" . "name" "bitnami") }}
  interval: 5m
  timeout: 7m
  targetNamespace: {{ .Release.Namespace }}
  values:
    global:
      security:
        allowInsecureImages: true
    image:
      repository: bitnamilegacy/valkey
      tag: 8.1.3-debian-12-r3
    sentinel:
      enabled: true
      image:
        repository: bitnamilegacy/valkey-sentinel
        tag: 8.1.3-debian-12-r3
{{- end }}