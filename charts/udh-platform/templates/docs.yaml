{{- if .Values.docs.enabled -}}
{{ $name := "docs" -}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ printf "%s-%s" (include "common.names.fullname" .) $name }}
  labels: {{- include "common.labels.standard" . | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
spec:
  replicas: {{ .Values.docs.replicas | default 1 | int }}
  selector:
    matchLabels: {{- include "common.labels.matchLabels" . | nindent 6 }}
      app.kubernetes.io/component: {{ $name }}
  template:
    metadata:
      labels: {{- include "common.labels.standard" . | nindent 8 }}
        app.kubernetes.io/component: {{ $name }}
    spec:
      {{- include "udh-platform.imagePullSecrets" (dict "context" .) | nindent 6 }}
      containers:
      - name: {{ $name }}
        image: {{ include "udh-platform.images.image" (dict "imageRoot" .Values.docs.image "global" .Values.global) }}
        imagePullPolicy: {{ .Values.docs.image.pullPolicy }}
        ports:
          - containerPort: 3000
            name: http
        resources: {{- toYaml .Values.docs.resources | nindent 10 }}
---
{{ $serviceName := printf "%s-%s" (include "common.names.fullname" .) $name -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ $serviceName }}
  labels: {{- include "common.labels.standard" . | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
spec:
  ports:
  - port: 80
    name: http
    targetPort: http
  selector: {{- include "common.labels.matchLabels" . | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
---
{{ $host := include "data-hub.docs.hostname" . -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ printf "%s-%s" (include "common.names.fullname" .) $name | quote }}
  labels: {{- include "common.labels.standard" . | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
  annotations:
    {{- include "udh.ingress.annotations" (dict "annotations" .Values.docs.ingress.annotations "context" .) | nindent 4 }}
spec:
  rules:
    - host: {{ $host | quote }}
      http:
        paths:
          - backend: {{- include "common.ingress.backend" (dict "serviceName"  $serviceName "servicePort" "http" "context" .) | nindent 14 }}
            pathType: Prefix
            path: /
  tls:
  - hosts:
    - {{ $host }}
    secretName: {{ $host }}-tls
{{- end -}}