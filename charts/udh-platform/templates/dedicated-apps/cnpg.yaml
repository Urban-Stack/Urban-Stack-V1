apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: {{ printf "%s-dedicated-apps-db" (include "common.names.fullname"  .) | quote }}
  namespace: {{ include "udh.dedicated-apps-namespace" . | quote }}
spec:
  releaseName: {{ printf "%s-dedicated-apps-db" (include "common.names.fullname"  .) | quote }}
  chart:
    spec:
      chart: teuto-cnpg
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: {{ printf "%s-teuto" (include "common.names.fullname"  .) | quote }}
        namespace: {{ .Release.Namespace }}
      version: 3.x.x
  interval: 1m
  values:
    databaseImage: {{- .Values.dedicatedAppsDatabase.image | toYaml | nindent 6 }}
    {{- if .Values.dedicatedAppsDatabase.backup }}
    backup:
      schedule: {{ .Values.dedicatedAppsDatabase.backup.schedule | quote }}
      s3:
        endpointURL: {{ .Values.dedicatedAppsDatabase.backup.s3.endpointURL | quote }}
        path: {{ .Values.dedicatedAppsDatabase.backup.s3.path | quote }}
        secret:
          name: {{ printf "%s-dedicated-apps-backup" (include "common.names.fullname"  .) | quote }}
    {{- end }}
    storageSize: {{ .Values.dedicatedAppsDatabase.persistence.size | quote }}
    instances: {{ .Values.dedicatedAppsDatabase.replicas }}
---
{{- if .Values.dedicatedAppsDatabase.backup }}
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: {{ printf "%s-dedicated-apps-backup" (include "common.names.fullname"  .) | quote }}
  namespace: {{ include "udh.dedicated-apps-namespace" . | quote }}
stringData:
  ACCESS_KEY_ID: {{ .Values.dedicatedAppsDatabase.backup.s3.secret.accessKeyId }}
  ACCESS_SECRET_KEY: {{ .Values.dedicatedAppsDatabase.backup.s3.secret.accessSecretKey }}
{{- end -}}
