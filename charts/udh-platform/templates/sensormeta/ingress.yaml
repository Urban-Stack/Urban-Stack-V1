{{- $name := "sensormeta" -}}
{{- $serviceName := printf "%s-%s" (include "common.names.fullname" .) $name -}}
---
{{ $host := include "data-hub.sensormeta.hostname" . -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ printf "%s-%s" (include "common.names.fullname" .) $name | quote }}
  labels: {{- include "common.labels.standard" . | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
  annotations:
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://{{ include "data-hub.govhub.hostname" . }},https://{{ include "data-hub.docs.hostname" . }}{{ if .Values.global.testDeployment }},http://0.0.0.0:8000,localhost:8000{{ end }}"
    {{- include "udh.ingress.annotations" (dict "annotations" .Values.sensormeta.ingress.annotations "context" .) | nindent 4 }}
spec:
  rules:
    - host: {{ $host | quote }}
      http:
        paths:
          - backend: {{- include "common.ingress.backend" (dict "serviceName" $serviceName "servicePort" "http" "context" .) | nindent 14 }}
            pathType: Prefix
            path: /api/v1/metadata
  tls:
  - hosts:
    - {{ $host }}
    secretName: {{ $host }}-tls
