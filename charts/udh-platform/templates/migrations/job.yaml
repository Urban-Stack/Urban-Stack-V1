{{- $queryonlyPasswordSpec := (merge (dict "name" "clickhouse-queryonly") .) -}}
{{- $queryonlyPassword := include "udh.secret" $queryonlyPasswordSpec }}
{{ include "udh.secretManifest" (merge (dict "value" $queryonlyPassword) $queryonlyPasswordSpec) }}
{{- define "udh.babashkaContainer.env-get-keycloak-fingerprint.clj" -}}
- name: KEYCLOAK_DOMAIN
  value: {{ (include "data-hub.keycloak.hostname" .context) | quote }}
{{- if .context.Values.global.trustCaSecretName }}
- name: CA_BUNDLE
  value: /tls/ca.crt
{{- end }}
{{- end }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "data-hub.name" (dict "context" . "name" "migrations") }}
  labels: {{- include "common.labels.standard" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  template:
    spec:
      serviceAccountName: {{ include "data-hub.name" (dict "context" . "name" "migrations") }}
      initContainers:
        - name: wait-dependencies
          image: {{ include "common.images.image" (dict "imageRoot" .Values.global.basePipeline.image "global" .Values.global) }}
          command:
            - bash
            - -ce
            - |
              kubectl rollout status deployment &
              kubectl rollout status statefulset &

              {{- if .Values.objectStorage.reuseClusterFromNamespace }}
              kubectl rollout status deployment -n {{ .Values.objectStorage.reuseClusterFromNamespace }} {{ printf "rook-ceph-rgw-ns-%s-a" .Release.Namespace }} &
              {{- end }}

              wait || true
        - name: clickhouse-migrations
          image: {{ .Values.clickhouse.image | quote }}
          command:
            - bash
            - -c
            - |
              ch () {
              clickhouse-client \
              --host     "$CLICKHOUSE_HOST" \
              --user     "$CLICKHOUSE_USERNAME" \
              --password "$CLICKHOUSE_PASSWORD" \
              "$@"
              }

              ch --param_QUERYONLY_PASSWORD "$QUERYONLY_PASSWORD" <<<"$1"
          args:
            - inline script
            - | {{- .Files.Get "files/clickhouse.sql" | replace "KAFKA_HOST" (include "udh.kafka.host" .) | nindent 14 }}
          env:
            {{- include "udh.clickhouse.env.admin" . | nindent 12 }}
            - name: QUERYONLY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "data-hub.name" (dict "context" . "name" "clickhouse-queryonly") }}
                  key: clickhouse-queryonly
        {{- if .Values.objectStorage.enabled }}
        - name: rgw-setup
          image: {{ include "common.images.image" (dict "imageRoot" .Values.global.basePipeline.image "global" .Values.global) }}
          command:
            - bash
            - -ce
            - kubectl exec -n {{ coalesce .Values.objectStorage.reuseClusterFromNamespace .Release.Namespace }} deploy/rook-ceph-tools -- bash -c "$0"
            - |
              set -eu -o pipefail

              rgwa="radosgw-admin {{- if .Values.objectStorage.reuseClusterFromNamespace }} --rgw-realm={{ printf "ns-%s" .Release.Namespace }}{{- end }}"

              $rgwa account get    --account-id=RGW99999999999999999 ||
              $rgwa account create --account-id=RGW99999999999999999 --max-users=999999 --max-buckets=999999

              $rgwa user modify --uid={{ printf "%s-bucket-admin" (include "common.names.fullname" .) | quote }} --display-name=bucketadmin --account-id=RGW99999999999999999 --account-root
              $rgwa user modify --uid={{ printf "%s-oidc-admin" (include "common.names.fullname" .) | quote }} --display-name=oidcadmin --account-id=RGW99999999999999999

              # if role not in account (thus found without account id), delete and re-create correctly (below)
              $rgwa role delete --role-name usercode || true

              {{- if and .Values.objectStorage.reuseClusterFromNamespace .Values.global.testDeployment }}
              poolset () {
                for setting in "${@:2}"
                do
                  ceph osd pool set "$1" "${setting%%=*}" "${setting#*=}"
                done
              }
              ceph osd pool ls | grep "^{{ printf "ns-%s" .Release.Namespace }}\\." | tr -d \\r |
              while read pool
              do
                poolset "$pool" pg{_num_min,_num,p_num}=1 pg_autoscale_mode=off
              done
              {{- end }}
        - {{ include "udh.babashkaContainer" (dict "context" . "script" "get-keycloak-fingerprint.clj") | indent 10 | trim }}
          volumeMounts: &oidcVolumeMounts
            - mountPath: /fingerprint
              name: fingerprint
            {{- if .Values.global.trustCaSecretName }}
            - mountPath: /tls
              name: ca-cert
            {{- end }}
        - name: configure-rgw-oidc
          image: public.ecr.aws/aws-cli/aws-cli:2.15.19
          command:
            - bash
            - -ce
            - |
              # accept ID tokens from our Keycloak
              aws iam get-open-id-connect-provider --open-id-connect-provider-arn arn:aws:iam::RGW99999999999999999:oidc-provider/{{ include "data-hub.keycloak.hostname" . }}/realms/udh \
              || aws iam create-open-id-connect-provider --url https://{{ include "data-hub.keycloak.hostname" . }}/realms/udh --thumbprint-list "`cat /fingerprint/fp`" --client-id-list buckets

              # create the role used by federated users, allowed buckets are passed in session tags https://docs.ceph.com/en/reef/radosgw/session-tags/
              aws iam get-role --role-name usercode \
              || aws iam create-role --role-name usercode --max-session-duration $MAX_SESSION_DURATION --assume-role-policy-document "$POLICY"

              # apply changes to MAX_SESSION_DURATION
              aws iam update-role --role-name usercode --max-session-duration $MAX_SESSION_DURATION
          env:
            - name: AWS_ENDPOINT_URL
              value: {{ print "https://" ( include "data-hub.storage.hostname" . ) | quote }}
            {{- include "udh.objectstore.userEnv" (dict "user" "oidc-admin" "context" .) | nindent 12 }}
            - name: POLICY
              value: '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Action":["sts:AssumeRoleWithWebIdentity","sts:TagSession"],"Principal":{"Federated":["arn:aws:iam::RGW99999999999999999:oidc-provider/{{ include "data-hub.keycloak.hostname" . }}/realms/udh"]}}]}'
            - name: MAX_SESSION_DURATION
              value: "36000"
            - name: AWS_REGION
              value: ""
            {{- if .Values.global.trustCaSecretName }}
            - name: AWS_CA_BUNDLE
              value: /tls/ca.crt
            {{- end }}
          volumeMounts: *oidcVolumeMounts
          {{- end }}
        - {{ include "udh.migrations.repair" (dict "context" . "path" "_repair" "name" "repair-resources") | indent 10 | trim }}
        - name: wait-kc-cli-config
          image: {{ include "common.images.image" (dict "imageRoot" .Values.global.basePipeline.image "global" .Values.global) }}
          command:
            - bash
            - -ce
            - |
              while kubectl get hr | awk '{print $3}' | grep 'Unknown\|False'
              do
                # wait until all HelmReleases are Ready before provisioning resources
                # this is especially necessary to prevent keycloak-config-cli from deleting data-hub-admin group assignments after provisioning
                sleep 5
              done
        {{- if .Values.ckan.enabled }}
        - name: create-ckan-groups
          image: {{ include "common.images.image" (dict "imageRoot" .Values.global.basePipeline.image "global" .Values.global) }}
          command:
            - bash
            - -ce
            - |
              set -eu -o pipefail
              curl_ca () {
                curl -sSf {{ if .Values.global.trustCaSecretName }}--cacert /tls/ca.crt{{ end }} "$@"
              }

              for group in \
                '{"name": "soci", "title": "Bevölkerung und Gesellschaft"}' \
                '{"name": "educ", "title": "Bildung, Kultur und Sport"}' \
                '{"name": "ener", "title": "Energie"}' \
                '{"name": "heal", "title": "Gesundheit"}' \
                '{"name": "intr", "title": "Internationale Themen"}' \
                '{"name": "just", "title": "Justiz, Rechtssystem und öffentliche Sicherheit"}' \
                '{"name": "agri", "title": "Landwirtschaft, Fischerei, Forstwirtschaft und Nahrungsmittel"}' \
                '{"name": "gove", "title": "Regierung und öffentlicher Sektor"}' \
                '{"name": "regi", "title": "Regionen und Städte"}' \
                '{"name": "envi", "title": "Umwelt"}' \
                '{"name": "tran", "title": "Verkehr"}' \
                '{"name": "econ", "title": "Wirtschaft und Finanzen"}' \
                '{"name": "tech", "title": "Wissenschaft und Technologie"}'
              do
                curl_ca -X POST -H "Authorization: $CKAN_API_TOKEN" \
                  --json "`echo "$group" | jq --compact-output '.image_url = "https://{{ include "data-hub.ckan.hostname" . }}/base/images/groups/" + .name + ".svg"'`" \
                  https://{{ include "data-hub.ckan.hostname" . }}/api/3/action/group_create ||
                curl_ca -X POST -H "Authorization: $CKAN_API_TOKEN" \
                  --json "`echo "$group" | jq --compact-output '.image_url = "https://{{ include "data-hub.ckan.hostname" . }}/base/images/groups/" + .name + ".svg" | .id = .name'`" \
                  https://{{ include "data-hub.ckan.hostname" . }}/api/3/action/group_patch
              done
          env:
            - name: CKAN_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "data-hub.name" (dict "context" . "name" "ckan-ckan-config") }}
                  key: emailApiKey
          {{- if .Values.global.trustCaSecretName }}
          volumeMounts:
            - mountPath: /tls
              name: ca-cert
          {{- end }}
          {{- end }}
      containers:
        - name: provision-resources
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
          image: blairy/requests:20241008_2116@sha256:db9a5be3bc778b4eca0e59e601519db86c4e36958bbf46265ca2a5c91dfad571
          command: ["python3"]
          args:
            - -c
            - |
              {{- .Files.Get "files/resource-auto-provision/provision.py" | nindent 14 }}
              import json
              full_sync(json.loads({{ .Values.keycloak.resourceApiAutoProvision | toJson | quote }}))
          env:
            - name: LOGLEVEL
              value: info
            - name: READY_URLS
              value: https://{{ include "data-hub.superset.hostname" . }},{{ include "udh.keycloak.realmUrl" . }}
            - name: KEYCLOAK_REALM_URL
              value: {{ include "udh.keycloak.realmUrl" . }}
            - name: KEYCLOAK_ADMIN_URL
              value: https://{{ include "data-hub.keycloak.hostname" . }}/admin/realms/{{ .Values.keycloak.realm }}
            - *clientId
            - *clientSecret
          {{- if .Values.global.trustCaSecretName }}
            - name: REQUESTS_CA_BUNDLE
              value: /tls/ca.crt
          volumeMounts:
            - mountPath: /tls
              name: ca-cert
          {{- end }}
      volumes:
        - name: fingerprint
          emptyDir:
            sizeLimit: 100Mi
        {{- if .Values.global.trustCaSecretName }}
        - name: ca-cert
          secret:
            secretName: {{ .Values.global.trustCaSecretName }}
            items:
            - key: ca.crt
              path: ca.crt
        {{- end }}
      restartPolicy: OnFailure
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "data-hub.name" (dict "context" . "name" "nightly-repair") }}
  labels: {{- include "common.labels.standard" . | nindent 4 }}
spec:
  schedule: "0 3 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - {{ include "udh.migrations.repair" (dict "context" . "path" "_repair" "name" "repair-resources") | indent 14 | trim }}
          {{- if .Values.global.trustCaSecretName }}
          volumes:
            - name: ca-cert
              secret:
                secretName: {{ .Values.global.trustCaSecretName }}
                items:
                - key: ca.crt
                  path: ca.crt
          {{- end }}
          restartPolicy: OnFailure
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "data-hub.name" (dict "context" . "name" "inactivity-check") }}
  labels: {{- include "common.labels.standard" . | nindent 4 }}
spec:
  schedule: "0 2 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - {{ include "udh.migrations.repair" (dict "context" . "path" "_handle_inactive_users" "name" "inactivity-check") | indent 14 | trim }}
          {{- if .Values.global.trustCaSecretName }}
          volumes:
            - name: ca-cert
              secret:
                secretName: {{ .Values.global.trustCaSecretName }}
                items:
                - key: ca.crt
                  path: ca.crt
          {{- end }}
          restartPolicy: OnFailure
