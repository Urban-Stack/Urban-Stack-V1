{{- $name := "pubquery" -}}
{{- $serviceName := printf "%s-%s" (include "common.names.fullname" .) $name -}}
---
{{ $host := include "data-hub.pubquery.hostname" . -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ printf "%s-pubquery" (include "common.names.fullname" .) | quote }}
  labels: {{- include "common.labels.standard" . | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
  annotations:
    {{- include "udh.ingress.annotations" (dict "annotations" .Values.pubquery.ingress.annotations "context" .) | nindent 4 }}
spec:
  rules:
    - host: {{ $host | quote }}
      http:
        paths:
          - backend: {{- include "common.ingress.backend" (dict "serviceName" $serviceName "servicePort" "http" "context" .) | nindent 14 }}
            pathType: Prefix
            path: /api/v2/query
  tls:
  - hosts:
    - {{ $host }}
    secretName: {{ $host }}-tls
