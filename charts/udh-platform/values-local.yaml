objectStorage:
  singleNode: true
  serviceMonitor:
    enabled: false

frontend:
  govhub:
    image:
      repository: frontend/govhub
      pullPolicy: IfNotPresent
  citizenhub:
    image:
      repository: frontend/citizenhub
      pullPolicy: IfNotPresent

discourse:
  enabled: true

kafka:
  singleNode: true
  deleteClaim: true
  monitoring:
    enabled: false

ingestor:
  testmqtt:
    enabled: true

clickhouse:
  adminPassword: adminpassword

citytools:
  image:
    repository: citytools
    pullPolicy: IfNotPresent

ckan:
  serviceMonitor: false
  ingress:
    annotations:
      cert-manager.io/issuer: "udh-test-iss"
  image:
    registry: "localimage.test"
    pullPolicy: IfNotPresent
    repository: "ckan"
    tag: ""
    digest: ""
  solr:
    collectionReplicas: 1
    replicaCount: 1
    zookeeper:
      replicaCount: 1
  valkey:
    replicaCount: 1

nifi:
  enabled: true
