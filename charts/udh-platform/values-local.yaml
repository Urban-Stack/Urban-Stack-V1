global:
  baseDomain: data-hub.local
  udhImageRegistry: "localimage.test"
  trustCaSecretName: udh-test-iss
  storageClass: standard
  sslInsecureSkipVerify: true
  ingress:
    annotations:
      kubernetes.io/tls-acme: "true"
      cert-manager.io/issuer: "udh-test-iss"
  networkPolicy:
    additionalExternalEgress:
      - to:
          - podSelector:
              matchLabels:
                app.kubernetes.io/name: ingress-nginx
            namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: ingress-nginx
        ports:
          - protocol: TCP
            port: 80
          - protocol: TCP
            port: 443
  testDeployment: true

keycloak:
  debug: true
  logLevel: info,com.clickhouse:warn,udh:debug
  passwordPolicy: length(4)
  helpdeskEmail: helpdesk@example.com
  extensions:
    image:
      registry: "localimage.test"
      pullPolicy: IfNotPresent
      repository: "keycloak-extensions"
      tag: ""
      digest: ""
  testUsers:
    data-hub-admin:
      email: data-hub-admin@example.com
      firstName: Data Hub
      lastName: Admin
      password: adminpassword
      clientRoles:
        realm-management:
          - manage-realm
          - query-users
          - manage-users
          - query-groups
    demo:
      email: demo-udh-platform@example.com
      firstName: Mike
      lastName: Hunt
      password: demo
    demo2:
      email: demo2-udh-platform@example.com
      firstName: Tanya
      lastName: Smith
      password: demo
  resourceApiAutoProvision:
    tenants:
      guetersloh:
        members:
          - demo-udh-platform@example.com
          - demo2-udh-platform@example.com
          - data-hub-admin@example.com
        groups:
          admin:
            members:
              - demo-udh-platform@example.com
        viz-groups:
          sccon:
            dashboards:
              unwetter: {}
  smtp: &keycloakSMTP
    from: keycloak-udh-platform@teuto.net
    fromDisplayName: keycloak-local
    host: feature-mailhog
    auth: false
    ssl: false
  adminPassword: adminpassword

superset:
  smtp:
    <<: *keycloakSMTP
    from: superset-local@urbanstack.de
    fromDisplayName: Urban Stack

mailhog:
  enabled: true
  ingress:
    enabled: true

sharedAppsDatabase:
  serviceMonitor:
    enabled: false

sharedAppsNamespace: udh-shared-apps

dedicatedAppsDatabase:
  serviceMonitor:
    enabled: false

dedicatedAppsNamespace: udh-dedicated-apps

jupyterhub:
  singleuser:
    allowPrivateIPs: true # local test-env routes ingresses internally

