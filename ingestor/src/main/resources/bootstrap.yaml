spring:
  application:
    name: ingestor
  cloud:
    bootstrap:
      enabled: true
    kubernetes:
      config:
        enabled: false
      secrets:
        enabled: true
        enableApi: true
        name: ${DEPLOYMENT_NAME}
      reload:
        enabled: true
        monitoring-secrets: true
management:
  endpoints:
    web:
      discovery:
        enabled: false
